<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <filter id="gp" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gy" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="630" fill="#050c1e"/>

  <!-- Tablero 3x3 a la izquierda -->
  <g transform="translate(60, 65) scale(0.98)">
    <!-- Fila 0 -->
    <rect x="0"   y="0"   width="130" height="130" rx="16" fill="#ff1dce" filter="url(#gp)"/>
    <rect x="141" y="0"   width="130" height="130" rx="16" fill="#ff1dce" filter="url(#gp)"/>
    <rect x="282" y="0"   width="130" height="130" rx="16" fill="#0d1f4a" stroke="#163575" stroke-width="2"/>
    <!-- Fila 1 -->
    <rect x="0"   y="141" width="130" height="130" rx="16" fill="#ff1dce" filter="url(#gp)"/>
    <rect x="141" y="141" width="130" height="130" rx="16" fill="#0d1f4a" stroke="#ffcc00" stroke-width="4"/>
    <rect x="282" y="141" width="130" height="130" rx="16" fill="#ffe100" filter="url(#gy)"/>
    <!-- Fila 2 -->
    <rect x="0"   y="282" width="130" height="130" rx="16" fill="#0d1f4a" stroke="#163575" stroke-width="2"/>
    <rect x="141" y="282" width="130" height="130" rx="16" fill="#ffe100" filter="url(#gy)"/>
    <rect x="282" y="282" width="130" height="130" rx="16" fill="#ffe100" filter="url(#gy)"/>
  </g>

  <!-- Esquinas doradas decorativas -->
  <path d="M30 30 L30 95 M30 30 L95 30"          stroke="#ffcc00" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M1170 30 L1170 95 M1170 30 L1105 30"  stroke="#ffcc00" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M30 600 L30 535 M30 600 L95 600"      stroke="#ffcc00" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M1170 600 L1170 535 M1170 600 L1105 600" stroke="#ffcc00" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Texto a la derecha -->
  <g transform="translate(560, 0)">
    <!-- Título -->
    <text x="0" y="225" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-size="148" font-weight="900" fill="#ffcc00" letter-spacing="4">EL SUELO</text>
    <!-- Subrayado -->
    <rect x="0" y="245" width="450" height="6" fill="#ff1dce"/>
    <!-- Tagline -->
    <text x="0" y="330" font-family="'DM Sans', system-ui, Arial, sans-serif" font-size="38" font-weight="700" fill="#e8e8ff">Di qué ves antes de que</text>
    <text x="0" y="378" font-family="'DM Sans', system-ui, Arial, sans-serif" font-size="38" font-weight="700" fill="#e8e8ff">se acabe tu tiempo.</text>
    <!-- Footer -->
    <text x="0" y="490" font-family="'DM Sans', system-ui, Arial, sans-serif" font-size="26" font-weight="500" fill="#a8c5ff">🎤 Juego de adivinanza por voz</text>
    <text x="0" y="530" font-family="'DM Sans', system-ui, Arial, sans-serif" font-size="26" font-weight="500" fill="#a8c5ff">📱 1 o 2 móviles · sin instalación</text>
  </g>
</svg>
