<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200">
  <defs>
    <filter id="gp" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gy" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="1200" fill="#050c1e"/>

  <!-- Tablero 3x3 — cell 200, gap 16, total 632, centrado en x: (1200-632)/2 = 284 -->
  <g transform="translate(284, 200)">
    <!-- Fila 0 -->
    <rect x="0"   y="0"   width="200" height="200" rx="24" fill="#ff1dce" filter="url(#gp)"/>
    <rect x="216" y="0"   width="200" height="200" rx="24" fill="#ff1dce" filter="url(#gp)"/>
    <rect x="432" y="0"   width="200" height="200" rx="24" fill="#0d1f4a" stroke="#163575" stroke-width="3"/>
    <!-- Fila 1 -->
    <rect x="0"   y="216" width="200" height="200" rx="24" fill="#ff1dce" filter="url(#gp)"/>
    <rect x="216" y="216" width="200" height="200" rx="24" fill="#0d1f4a" stroke="#ffcc00" stroke-width="6"/>
    <rect x="432" y="216" width="200" height="200" rx="24" fill="#ffe100" filter="url(#gy)"/>
    <!-- Fila 2 -->
    <rect x="0"   y="432" width="200" height="200" rx="24" fill="#0d1f4a" stroke="#163575" stroke-width="3"/>
    <rect x="216" y="432" width="200" height="200" rx="24" fill="#ffe100" filter="url(#gy)"/>
    <rect x="432" y="432" width="200" height="200" rx="24" fill="#ffe100" filter="url(#gy)"/>
  </g>

  <!-- Esquinas doradas -->
  <path d="M50 50 L50 130 M50 50 L130 50"           stroke="#ffcc00" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M1150 50 L1150 130 M1150 50 L1070 50"     stroke="#ffcc00" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M50 1150 L50 1070 M50 1150 L130 1150"     stroke="#ffcc00" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M1150 1150 L1150 1070 M1150 1150 L1070 1150" stroke="#ffcc00" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Título debajo del tablero -->
  <text x="600" y="985" text-anchor="middle" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-size="148" font-weight="900" fill="#ffcc00" letter-spacing="8">EL SUELO</text>
  <!-- Subrayado -->
  <rect x="380" y="1010" width="440" height="6" fill="#ff1dce"/>
  <!-- Tagline -->
  <text x="600" y="1095" text-anchor="middle" font-family="'DM Sans', system-ui, Arial, sans-serif" font-size="36" font-weight="600" fill="#a8c5ff">Di qué ves antes de que se acabe tu tiempo</text>
</svg>
